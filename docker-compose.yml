# Rede personalizada para os containers
networks:
  docker_rede:
    name: docker_rede
    driver: bridge

services:
  http-server-projeto-korp:
    container_name: http-server-projeto-korp
    # Build da imagem a partir do Dockerfile localizado na pasta app
    build:
      context: ./app
      dockerfile: Dockerfile
    networks:
      - docker_rede
  nginx:
    container_name: nginx-proxy
    image: nginx:stable-alpine3.23-perl
    ports:
      - 80:80
    networks:
      - docker_rede
    
    # Mapeamento do arquivo de configuração do Nginx para o container
    volumes:
      - ./nginx/http-server-projeto-korp.conf:/etc/nginx/conf.d/default.conf
    
    # O Nginx depende do serviço http-server-projeto-korp para garantir que o servidor HTTP esteja em execução antes de iniciar o Nginx
    depends_on:
      - http-server-projeto-korp
